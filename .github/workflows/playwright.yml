name: Playwright Tests
on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at 00:00 UTC
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Check Environment Versions
      run: |
         node -v
         npm -v  
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Send Email Notification
      uses: dawidd6/action-send-mail@v4
      with:
        # SMTP Server configuration (Example using Gmail SMTP)
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        
        # Email Content Configuration
        subject: "Playwright Automation Run: ${{ steps.run-tests.outcome == 'success' && 'PASSED' || 'FAILED' }}"
        to: romjapan1@gmail.com # <-- Replace with your actual email
        from: Playwright Automation Runner
        body: |
          The daily automated test run has completed.
          
          Result Status: ${{ steps.run-tests.outcome }}
          Repository: ${{ github.repository }}
          Workflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        
        # Optional: Attach the HTML zip report only if a test failed
        attachments: ${{ steps.run-tests.outcome == 'failure' && 'playwright-report.tar.gz' || '' }}

    - name: Enforce Workflow Failure State
      if: steps.run-tests.outcome == 'failure'
      run: exit 1